<svg xmlns="http://www.w3.org/2000/svg" width="520" height="130" viewBox="0 0 520 130">
  <title>GeoBee.io text wordmark — dark mode</title>
  <desc>For print, outline the text. Sora SemiBold for &#34;GeoBee&#34;, Space Mono Bold for &#34;.io&#34;.</desc>
  <defs></defs>
  <rect x="0" y="0" width="520" height="130" fill="#1C1917"></rect>
  <text x="16" y="92" font-family="Sora, sans-serif" font-weight="600" font-size="90" letter-spacing="-2.7" fill="#FAF8F4">GeoBee</text>
  <text x="430" y="60" font-family="&#39;Space Mono&#39;, monospace" font-weight="700" font-size="47" fill="#FFC107">.io</text>
</svg>