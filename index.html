document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

>\n\n<div><\u002Fdiv>\n<!-- ====== COVER ====== -->\n  <div style=\"font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: #C77D18; margin: 6px 0 22px;\">GeoBee.io — Brand Book<\u002Fdiv>\n  <div style=\"border: 1px solid #E7E1D7; border-radius: 18px; overflow: hidden; margin-bottom: 30px;\">\n    <div style=\"background: #FAF8F4; padding: 46px 40px 40px;\">\n      <dc-import name=\"GeoBee Mark\" variant=\"full\" mode=\"light\" size=\"66\" hint-size=\"400px,92px\"><\u002Fdc-import>\n    <\u002Fdiv>\n    <div style=\"background: #1C1917; padding: 26px 40px; display: flex; align-items: center; justify-content: space-between;\">\n      <span style=\"font-family: 'Figtree', sans-serif; font-size: 12.5px; color: #C9C2B8;\">RiskOps &amp; Geospatial Intelligence Observability<\u002Fspan>\n      <span style=\"font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: #6E655A;\">v1.0 · JUL 2026<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <h1 style=\"font-family: 'Sora', sans-serif; font-weight: 800; font-size: 40px; line-height: 1.04; letter-spacing: -0.035em; margin: 0 0 14px; color: #1C1917;\">01 — Logo &amp; Symbol<\u002Fh1>\n  <p style=\"font-family: 'Figtree', sans-serif; font-size: 13px; line-height: 1.7; color: #3A352F; max-width: 460px; margin: 0 0 8px;\">The GeoBee mark is a single hive cell that has become a bee — the atom of the brand's language. This document specifies how to write the name, reproduce the mark, colour it, space it, and export it. Every rule here protects the mark's clarity from a favicon to a building sign.<\u002Fp>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 34px 0;\"><\u002Fdiv>\n\n  <!-- ====== 1.1 WRITING THE NAME ====== -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 10px;\">1.1 — Writing the name<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; margin: 0 0 12px; color: #1C1917;\">GeoBee, always one word<\u002Fh2>\n    <p style=\"font-family: 'Figtree', sans-serif; font-size: 12px; line-height: 1.65; color: #3A352F; max-width: 500px; margin: 0 0 18px;\">The name is written as a single closed compound with two internal capitals — a <em>medial capital<\u002Fem> on both stems. This spelling is the trademark and must never be altered, spaced, hyphenated, or fully capitalised in running text.<\u002Fp>\n\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px;\">\n      <figure style=\"margin: 0; background: #FAF8F4; border: 1px solid #E7E1D7; border-radius: 12px; padding: 20px 22px; break-inside: avoid;\">\n        <div style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 30px; letter-spacing: -0.02em; color: #1C1917;\">GeoBee<span style=\"font-family: 'Space Mono', monospace; font-weight: 700; font-size: 15px; color: #C77D18; vertical-align: super;\">™<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.06em; color: #8A8175; margin-top: 8px;\">Capital <b>G<\u002Fb> · lowercase <b>eo<\u002Fb> · capital <b>B<\u002Fb> · lowercase <b>ee<\u002Fb><\u002Fdiv>\n        <p style=\"font-family: 'Figtree', sans-serif; font-size: 11px; line-height: 1.55; color: #6E655A; margin: 8px 0 0;\">The company &amp; brand. Use in prose, titles and legal text.<\u002Fp>\n      <\u002Ffigure>\n      <figure style=\"margin: 0; background: #FAF8F4; border: 1px solid #E7E1D7; border-radius: 12px; padding: 20px 22px; break-inside: avoid;\">\n        <div style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 30px; letter-spacing: -0.02em; color: #1C1917;\">GeoBee<span style=\"font-family: 'Space Mono', monospace; font-weight: 700; font-size: 20px; color: #C77D18;\">.io<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.06em; color: #8A8175; margin-top: 8px;\">Wordmark <b>GeoBee<\u002Fb> + lowercase TLD <b>.io<\u002Fb><\u002Fdiv>\n        <p style=\"font-family: 'Figtree', sans-serif; font-size: 11px; line-height: 1.55; color: #6E655A; margin: 8px 0 0;\">The platform, product &amp; website. The <b>.io<\u002Fb> is always lowercase.<\u002Fp>\n      <\u002Ffigure>\n    <\u002Fdiv>\n\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 14px;\">\n      <div style=\"break-inside: avoid;\">\n        <div style=\"font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #1F8A5B; margin-bottom: 8px;\">✓ Correct<\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 6px; font-family: 'Figtree', sans-serif; font-size: 13px; color: #1C1917;\">\n          <span style=\"background: #EAF4EE; border-radius: 7px; padding: 7px 12px;\">GeoBee<\u002Fspan>\n          <span style=\"background: #EAF4EE; border-radius: 7px; padding: 7px 12px;\">GeoBee.io<\u002Fspan>\n          <span style=\"background: #EAF4EE; border-radius: 7px; padding: 7px 12px;\">GeoBee™ <span style=\"color:#6E655A; font-size:11px;\">(first / prominent use)<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"break-inside: avoid;\">\n        <div style=\"font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #C0392B; margin-bottom: 8px;\">✕ Never<\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 6px; font-family: 'Figtree', sans-serif; font-size: 13px; color: #8A8175;\">\n          <span style=\"background: #F6ECEA; border-radius: 7px; padding: 7px 12px; text-decoration: line-through;\">Geobee · geobee · GEOBEE<\u002Fspan>\n          <span style=\"background: #F6ECEA; border-radius: 7px; padding: 7px 12px; text-decoration: line-through;\">Geo Bee · Geo-Bee · geoBee<\u002Fspan>\n          <span style=\"background: #F6ECEA; border-radius: 7px; padding: 7px 12px; text-decoration: line-through;\">GeoBee.IO · geobee.io · GeoBee .io<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-family: 'Figtree', sans-serif; font-size: 10.5px; line-height: 1.55; color: #8A8175; margin: 14px 0 0;\">Exception: all-caps lock-ups (e.g. a nav bar set entirely in capitals) may render <b>GEOBEE<\u002Fb> for optical consistency, but the medial capitals return the moment mixed case is available. Show the ™ on first or most prominent mention; switch to ® once the mark is registered.<\u002Fp>\n  <\u002Fsection>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 34px 0;\"><\u002Fdiv>\n\n  <!-- ====== 1.2 THE LOGO SYSTEM ====== -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 10px;\">1.2 — The logo system<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; margin: 0 0 6px; color: #1C1917;\">Three assets, two colourways<\u002Fh2>\n    <p style=\"font-family: 'Figtree', sans-serif; font-size: 12px; line-height: 1.65; color: #3A352F; max-width: 500px; margin: 0 0 20px;\">The system is deliberately small: a <b>primary lockup<\u002Fb>, a <b>symbol<\u002Fb>, and a <b>text wordmark<\u002Fb>. Each exists in a light-mode (ink on paper) and dark-mode (paper on ink) rendering. The yellow never changes.<\u002Fp>\n\n    <!-- primary lockup -->\n    <figure style=\"margin: 0 0 14px; break-inside: avoid;\">\n      <div style=\"font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #8A8175; margin-bottom: 8px;\">A · Primary lockup — the bee is the <b>o<\u002Fb><\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px;\">\n        <div style=\"background: #FAF8F4; border: 1px solid #E7E1D7; border-radius: 12px; padding: 30px; display: flex; align-items: center; justify-content: center;\"><dc-import name=\"GeoBee Mark\" variant=\"full\" mode=\"light\" size=\"46\" hint-size=\"260px,64px\"><\u002Fdc-import><\u002Fdiv>\n        <div style=\"background: #1C1917; border-radius: 12px; padding: 30px; display: flex; align-items: center; justify-content: center;\"><dc-import name=\"GeoBee Mark\" variant=\"full\" mode=\"dark\" size=\"46\" hint-size=\"260px,64px\"><\u002Fdc-import><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Ffigure>\n\n    <!-- symbol + wordmark row -->\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 14px;\">\n      <figure style=\"margin: 0; break-inside: avoid;\">\n        <div style=\"font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #8A8175; margin-bottom: 8px;\">B · Symbol<\u002Fdiv>\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 10px;\">\n          <div style=\"background: #FAF8F4; border: 1px solid #E7E1D7; border-radius: 12px; padding: 22px; display: flex; align-items: center; justify-content: center;\"><dc-import name=\"GeoBee Mark\" variant=\"symbol\" mode=\"light\" size=\"58\" hint-size=\"58px,74px\"><\u002Fdc-import><\u002Fdiv>\n          <div style=\"background: #1C1917; border-radius: 12px; padding: 22px; display: flex; align-items: center; justify-content: center;\"><dc-import name=\"GeoBee Mark\" variant=\"symbol\" mode=\"dark\" size=\"58\" hint-size=\"58px,74px\"><\u002Fdc-import><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Ffigure>\n      <figure style=\"margin: 0; break-inside: avoid;\">\n        <div style=\"font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #8A8175; margin-bottom: 8px;\">C · Text wordmark (no symbol)<\u002Fdiv>\n        <div style=\"display: grid; grid-template-rows: 1fr 1fr; gap: 10px;\">\n          <div style=\"background: #FAF8F4; border: 1px solid #E7E1D7; border-radius: 12px; padding: 14px; display: flex; align-items: center; justify-content: center;\"><dc-import name=\"GeoBee Mark\" variant=\"wordmark\" mode=\"light\" size=\"30\" hint-size=\"180px,40px\"><\u002Fdc-import><\u002Fdiv>\n          <div style=\"background: #1C1917; border-radius: 12px; padding: 14px; display: flex; align-items: center; justify-content: center;\"><dc-import name=\"GeoBee Mark\" variant=\"wordmark\" mode=\"dark\" size=\"30\" hint-size=\"180px,40px\"><\u002Fdc-import><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Ffigure>\n    <\u002Fdiv>\n    <p style=\"font-family: 'Figtree', sans-serif; font-size: 10.5px; line-height: 1.55; color: #8A8175; margin: 14px 0 0;\">Use the <b>primary lockup<\u002Fb> wherever space allows. Drop to the <b>symbol<\u002Fb> for avatars, app icons and favicons. Use the <b>text wordmark<\u002Fb> only in single-colour or tightly constrained contexts (embossing, fax-grade print, legal footers).<\u002Fp>\n  <\u002Fsection>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 34px 0;\"><\u002Fdiv>\n\n  <!-- ====== 1.3 CONSTRUCTION ====== -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 10px;\">1.3 — Construction &amp; reproduction<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; margin: 0 0 6px; color: #1C1917;\">Building the bee from scratch<\u002Fh2>\n    <p style=\"font-family: 'Figtree', sans-serif; font-size: 12px; line-height: 1.65; color: #3A352F; max-width: 500px; margin: 0 0 20px;\">The symbol is drawn on a <b>120 × 120<\u002Fb> unit grid (the antennae extend above the top edge into negative space). Everything is geometric — no freehand curves — so it can be rebuilt exactly in any vector tool.<\u002Fp>\n\n    <figure style=\"margin: 0 0 18px; break-inside: avoid; display: grid; grid-template-columns: 200px 1fr; gap: 22px; align-items: center;\">\n      <div style=\"background: #FAF8F4; background-image: linear-gradient(#EDE7DC 1px, transparent 1px), linear-gradient(90deg, #EDE7DC 1px, transparent 1px); background-size: 20px 20px; border: 1px solid #E7E1D7; border-radius: 12px; padding: 26px 20px; display: flex; align-items: center; justify-content: center;\">\n        <dc-import name=\"GeoBee Mark\" variant=\"symbol\" mode=\"light\" size=\"120\" hint-size=\"120px,150px\"><\u002Fdc-import>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 10px; font-family: 'Figtree', sans-serif; font-size: 11.5px; line-height: 1.5; color: #3A352F;\">\n        <div style=\"display: flex; gap: 10px;\"><span style=\"font-family: 'Space Mono', monospace; color: #C77D18; font-size: 10px; min-width: 74px;\">CELL<\u002Fspan><span>Flat-top elongated hexagon. Vertices: <b>(44,10) (76,10) (104,60) (76,110) (44,110) (16,60)<\u002Fb>.<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; gap: 10px;\"><span style=\"font-family: 'Space Mono', monospace; color: #C77D18; font-size: 10px; min-width: 74px;\">CORNERS<\u002Fspan><span>Rounded with a <b>12-unit<\u002Fb> round line-join (stroke = fill colour) — softens the hexagon into an oblong bee body.<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; gap: 10px;\"><span style=\"font-family: 'Space Mono', monospace; color: #C77D18; font-size: 10px; min-width: 74px;\">STRIPES<\u002Fspan><span>Three <b>14-unit<\u002Fb> rounded bars at y = <b>34 / 59 / 84<\u002Fb>, clipped to the cell. These are the caution-tape / bee stripes.<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; gap: 10px;\"><span style=\"font-family: 'Space Mono', monospace; color: #C77D18; font-size: 10px; min-width: 74px;\">ANTENNAE<\u002Fspan><span>Two quadratic curves from <b>(52,12)→(29,−21)<\u002Fb> and <b>(68,12)→(91,−21)<\u002Fb>, 5-unit round stroke.<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; gap: 10px;\"><span style=\"font-family: 'Space Mono', monospace; color: #C77D18; font-size: 10px; min-width: 74px;\">POLLEN<\u002Fspan><span>Two <b>7-unit<\u002Fb> dots cap the antennae, in Hive Yellow (light) / Paper (dark).<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Ffigure>\n\n    <div style=\"break-inside: avoid;\">\n      <div style=\"font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #8A8175; margin-bottom: 8px;\">Reference SVG — light mode symbol<\u002Fdiv>\n      <pre style=\"font-family: 'Space Mono', monospace; font-size: 9px; line-height: 1.55; color: #E7E1D7; background: #1C1917; border-radius: 12px; padding: 18px 20px; overflow-x: auto; margin: 0; white-space: pre-wrap; word-break: break-word;\">&lt;svg viewBox=\"0 -34 120 154\" xmlns=\"http://www.w3.org/2000/svg\"&gt;\n  &lt;clipPath id=\"cell\"&gt;&lt;polygon points=\"44,10 76,10 104,60 76,110 44,110 16,60\"/&gt;&lt;/clipPath&gt;\n  &lt;path d=\"M52 12 Q41 -10 29 -21\" fill=\"none\" stroke=\"#1C1917\" stroke-width=\"5\" stroke-linecap=\"round\"/&gt;\n  &lt;path d=\"M68 12 Q79 -10 91 -21\" fill=\"none\" stroke=\"#1C1917\" stroke-width=\"5\" stroke-linecap=\"round\"/&gt;\n  &lt;circle cx=\"29\" cy=\"-21\" r=\"7\" fill=\"#FFC107\"/&gt;&lt;circle cx=\"91\" cy=\"-21\" r=\"7\" fill=\"#FFC107\"/&gt;\n  &lt;polygon points=\"44,10 76,10 104,60 76,110 44,110 16,60\" fill=\"#1C1917\"\n           stroke=\"#1C1917\" stroke-width=\"12\" stroke-linejoin=\"round\"/&gt;\n  &lt;g clip-path=\"url(#cell)\"&gt;\n    &lt;rect x=\"-4\" y=\"34\" width=\"128\" height=\"14\" rx=\"7\" fill=\"#FFC107\"/&gt;\n    &lt;rect x=\"-4\" y=\"59\" width=\"128\" height=\"14\" rx=\"7\" fill=\"#FFC107\"/&gt;\n    &lt;rect x=\"-4\" y=\"84\" width=\"128\" height=\"14\" rx=\"7\" fill=\"#FFC107\"/&gt;\n  &lt;/g&gt;\n&lt;/svg&gt;<\u002Fpre>\n      <p style=\"font-family: 'Figtree', sans-serif; font-size: 10.5px; line-height: 1.55; color: #8A8175; margin: 12px 0 0;\">Dark mode: swap the cell &amp; antennae fill to <b>#FFC107<\u002Fb>, the stripes to <b>#1C1917<\u002Fb>, and the pollen dots to <b>#FAF8F4<\u002Fb>. For the wordmark, set “GeoBee” in Sora SemiBold and drop this symbol in place of the “o”, its baseline sitting fractionally below the type baseline.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 34px 0;\"><\u002Fdiv>\n\n  <!-- ====== 1.4 CLEAR SPACE & MIN SIZE ====== -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 10px;\">1.4 — Clear space &amp; minimum size<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; margin: 0 0 20px; color: #1C1917;\">Give the bee room to breathe<\u002Fh2>\n    <div style=\"display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px;\">\n      <figure style=\"margin: 0; break-inside: avoid;\">\n        <div style=\"position: relative; background: #FAF8F4; border: 1px solid #E7E1D7; border-radius: 12px; padding: 34px; display: flex; align-items: center; justify-content: center;\">\n          <div style=\"position: absolute; inset: 20px; border: 1px dashed #D8B98A; border-radius: 8px;\"><\u002Fdiv>\n          <dc-import name=\"GeoBee Mark\" variant=\"full\" mode=\"light\" size=\"40\" hint-size=\"230px,56px\"><\u002Fdc-import>\n        <\u002Fdiv>\n        <figcaption style=\"font-family: 'Figtree', sans-serif; font-size: 10.5px; line-height: 1.5; color: #6E655A; margin-top: 10px;\">Minimum clear space on all sides equals the <b>height of the bee symbol<\u002Fb> — call it one “bee” of margin. Never place type, edges or other logos inside this zone.<\u002Ffigcaption>\n      <\u002Ffigure>\n      <figure style=\"margin: 0; break-inside: avoid;\">\n        <div style=\"background: #FAF8F4; border: 1px solid #E7E1D7; border-radius: 12px; padding: 22px; display: flex; flex-direction: column; gap: 16px; align-items: flex-start;\">\n          <div style=\"display: flex; align-items: center; gap: 12px;\"><dc-import name=\"GeoBee Mark\" variant=\"symbol\" mode=\"light\" size=\"24\" hint-size=\"24px,31px\"><\u002Fdc-import><span style=\"font-family: 'Space Mono', monospace; font-size: 10px; color: #8A8175;\">16 px — favicon floor (symbol)<\u002Fspan><\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 12px;\"><dc-import name=\"GeoBee Mark\" variant=\"full\" mode=\"light\" size=\"20\" hint-size=\"120px,28px\"><\u002Fdc-import><span style=\"font-family: 'Space Mono', monospace; font-size: 10px; color: #8A8175;\">24 px tall — lockup floor (digital)<\u002Fspan><\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 12px;\"><dc-import name=\"GeoBee Mark\" variant=\"full\" mode=\"light\" size=\"28\" hint-size=\"150px,38px\"><\u002Fdc-import><span style=\"font-family: 'Space Mono', monospace; font-size: 10px; color: #8A8175;\">10 mm tall — lockup floor (print)<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <figcaption style=\"font-family: 'Figtree', sans-serif; font-size: 10.5px; line-height: 1.5; color: #6E655A; margin-top: 10px;\">Below these sizes, always use the <b>symbol<\u002Fb> alone — the wordmark loses legibility.<\u002Ffigcaption>\n      <\u002Ffigure>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 34px 0;\"><\u002Fdiv>\n\n  <!-- ====== 1.5 BACKGROUNDS & MISUSE ====== -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 10px;\">1.5 — Backgrounds &amp; misuse<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; margin: 0 0 18px; color: #1C1917;\">Where it may live, and may not<\u002Fh2>\n\n    <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px;\">\n      <div style=\"break-inside: avoid;\">\n        <div style=\"background: #FAF8F4; border: 1px solid #E7E1D7; border-radius: 12px; padding: 22px; display: flex; align-items: center; justify-content: center; min-height: 84px;\"><dc-import name=\"GeoBee Mark\" variant=\"full\" mode=\"light\" size=\"30\" hint-size=\"170px,42px\"><\u002Fdc-import><\u002Fdiv>\n        <div style=\"font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: #1F8A5B; margin-top: 7px;\">✓ Ink on paper white<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"break-inside: avoid;\">\n        <div style=\"background: #1C1917; border-radius: 12px; padding: 22px; display: flex; align-items: center; justify-content: center; min-height: 84px;\"><dc-import name=\"GeoBee Mark\" variant=\"full\" mode=\"dark\" size=\"30\" hint-size=\"170px,42px\"><\u002Fdc-import><\u002Fdiv>\n        <div style=\"font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: #1F8A5B; margin-top: 7px;\">✓ Paper on ink<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"break-inside: avoid;\">\n        <div style=\"background: #FFC107; border-radius: 12px; padding: 22px; display: flex; align-items: center; justify-content: center; min-height: 84px;\"><dc-import name=\"GeoBee Mark\" variant=\"full\" mode=\"light\" size=\"30\" hint-size=\"170px,42px\"><\u002Fdc-import><\u002Fdiv>\n        <div style=\"font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: #1F8A5B; margin-top: 7px;\">✓ Ink on Hive Yellow<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;\">\n      <figure style=\"margin: 0; break-inside: avoid;\">\n        <div style=\"position: relative; background: #FAF8F4; border: 1px solid #E7E1D7; border-radius: 12px; padding: 18px; display: flex; align-items: center; justify-content: center; min-height: 72px;\"><div style=\"transform: scaleX(1.5);\"><dc-import name=\"GeoBee Mark\" variant=\"symbol\" mode=\"light\" size=\"34\" hint-size=\"34px,44px\"><\u002Fdc-import><\u002Fdiv><\u002Fdiv>\n        <div style=\"font-family: 'Space Mono', monospace; font-size: 8.5px; letter-spacing: 0.06em; text-transform: uppercase; color: #C0392B; margin-top: 7px;\">✕ Stretch / distort<\u002Fdiv>\n      <\u002Ffigure>\n      <figure style=\"margin: 0; break-inside: avoid;\">\n        <div style=\"position: relative; background: #FAF8F4; border: 1px solid #E7E1D7; border-radius: 12px; padding: 18px; display: flex; align-items: center; justify-content: center; min-height: 72px;\"><div style=\"transform: rotate(18deg);\"><dc-import name=\"GeoBee Mark\" variant=\"symbol\" mode=\"light\" size=\"34\" hint-size=\"34px,44px\"><\u002Fdc-import><\u002Fdiv><\u002Fdiv>\n        <div style=\"font-family: 'Space Mono', monospace; font-size: 8.5px; letter-spacing: 0.06em; text-transform: uppercase; color: #C0392B; margin-top: 7px;\">✕ Rotate / tilt<\u002Fdiv>\n      <\u002Ffigure>\n      <figure style=\"margin: 0; break-inside: avoid;\">\n        <div style=\"position: relative; background: #6E8CB8; border-radius: 12px; padding: 18px; display: flex; align-items: center; justify-content: center; min-height: 72px;\"><dc-import name=\"GeoBee Mark\" variant=\"symbol\" mode=\"light\" size=\"34\" hint-size=\"34px,44px\"><\u002Fdc-import><\u002Fdiv>\n        <div style=\"font-family: 'Space Mono', monospace; font-size: 8.5px; letter-spacing: 0.06em; text-transform: uppercase; color: #C0392B; margin-top: 7px;\">✕ Low-contrast bg<\u002Fdiv>\n      <\u002Ffigure>\n      <figure style=\"margin: 0; break-inside: avoid;\">\n        <div style=\"position: relative; background: #FAF8F4; border: 1px solid #E7E1D7; border-radius: 12px; padding: 18px; display: flex; align-items: center; justify-content: center; min-height: 72px;\"><div style=\"filter: hue-rotate(160deg);\"><dc-import name=\"GeoBee Mark\" variant=\"symbol\" mode=\"light\" size=\"34\" hint-size=\"34px,44px\"><\u002Fdc-import><\u002Fdiv><\u002Fdiv>\n        <div style=\"font-family: 'Space Mono', monospace; font-size: 8.5px; letter-spacing: 0.06em; text-transform: uppercase; color: #C0392B; margin-top: 7px;\">✕ Recolour<\u002Fdiv>\n      <\u002Ffigure>\n    <\u002Fdiv>\n    <p style=\"font-family: 'Figtree', sans-serif; font-size: 10.5px; line-height: 1.55; color: #8A8175; margin: 14px 0 0;\">Also never: add drop shadows or bevels, outline the wordmark, crop the antennae, place on a busy photo without a solid holding shape, or reconstruct the mark in a different typeface.<\u002Fp>\n  <\u002Fsection>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 34px 0;\"><\u002Fdiv>\n\n  <!-- ====== 1.6 CORE COLOURS ====== -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 10px;\">1.6 — Core brand colours<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; margin: 0 0 6px; color: #1C1917;\">Bee black, paper white, hive yellow<\u002Fh2>\n    <p style=\"font-family: 'Figtree', sans-serif; font-size: 12px; line-height: 1.65; color: #3A352F; max-width: 500px; margin: 0 0 20px;\">Three colours carry the entire identity. The full palette — warm neutrals and the calm accent — lives in document <b>03 · Colour &amp; Typography<\u002Fb>.<\u002Fp>\n\n    <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;\">\n      <div style=\"border: 1px solid #E7E1D7; border-radius: 14px; overflow: hidden; break-inside: avoid;\">\n        <div style=\"background: #1C1917; height: 96px;\"><\u002Fdiv>\n        <div style=\"padding: 14px 16px;\">\n          <div style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 14px; color: #1C1917;\">Bee Black<\u002Fdiv>\n          <div style=\"font-family: 'Space Mono', monospace; font-size: 10px; line-height: 1.7; color: #6E655A; margin-top: 8px;\">HEX&nbsp;&nbsp;#1C1917<br>RGB&nbsp;&nbsp;28 · 25 · 23<br>CMYK 0 · 11 · 18 · 89<br>PMS&nbsp;&nbsp;Black C (warm)<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border: 1px solid #E7E1D7; border-radius: 14px; overflow: hidden; break-inside: avoid;\">\n        <div style=\"background: #FAF8F4; height: 96px; border-bottom: 1px solid #E7E1D7;\"><\u002Fdiv>\n        <div style=\"padding: 14px 16px;\">\n          <div style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 14px; color: #1C1917;\">Paper White<\u002Fdiv>\n          <div style=\"font-family: 'Space Mono', monospace; font-size: 10px; line-height: 1.7; color: #6E655A; margin-top: 8px;\">HEX&nbsp;&nbsp;#FAF8F4<br>RGB&nbsp;&nbsp;250 · 248 · 244<br>CMYK 0 · 1 · 2 · 2<br>PMS&nbsp;&nbsp;— (substrate white)<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border: 1px solid #E7E1D7; border-radius: 14px; overflow: hidden; break-inside: avoid;\">\n        <div style=\"background: #FFC107; height: 96px;\"><\u002Fdiv>\n        <div style=\"padding: 14px 16px;\">\n          <div style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 14px; color: #1C1917;\">Hive Yellow<\u002Fdiv>\n          <div style=\"font-family: 'Space Mono', monospace; font-size: 10px; line-height: 1.7; color: #6E655A; margin-top: 8px;\">HEX&nbsp;&nbsp;#FFC107<br>RGB&nbsp;&nbsp;255 · 193 · 7<br>CMYK 0 · 24 · 97 · 0<br>PMS&nbsp;&nbsp;1235 C<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-family: 'Figtree', sans-serif; font-size: 10.5px; line-height: 1.55; color: #8A8175; margin: 14px 0 0;\">Hive Yellow is the brand's “moment of alert”: reserve it for the mark, key actions and warnings — never as a flood-fill background behind body text. The amber <b>#C77D18<\u002Fb> used on the <b>.io<\u002Fb> is a print-safe darkening of Hive Yellow for small type on white.<\u002Fp>\n  <\u002Fsection>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 34px 0;\"><\u002Fdiv>\n\n  <!-- ====== 1.7 TYPOGRAPHY IN THE LOGO ====== -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 10px;\">1.7 — Typography in the mark<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; margin: 0 0 20px; color: #1C1917;\">Sora &amp; Space Mono<\u002Fh2>\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 14px;\">\n      <div style=\"border: 1px solid #E7E1D7; border-radius: 14px; padding: 22px 24px; break-inside: avoid;\">\n        <div style=\"font-family: 'Sora', sans-serif; font-weight: 600; font-size: 40px; letter-spacing: -0.02em; color: #1C1917; line-height: 1;\">Aa<\u002Fdiv>\n        <div style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 15px; color: #1C1917; margin-top: 14px;\">Sora — SemiBold<\u002Fdiv>\n        <p style=\"font-family: 'Figtree', sans-serif; font-size: 11px; line-height: 1.55; color: #6E655A; margin: 6px 0 0;\">The wordmark is set in Sora SemiBold, letter-spacing −0.03em. A geometric sans — calm, modern, engineered. Also the brand's display/headline face.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border: 1px solid #E7E1D7; border-radius: 14px; padding: 22px 24px; break-inside: avoid;\">\n        <div style=\"font-family: 'Space Mono', monospace; font-weight: 700; font-size: 40px; color: #C77D18; line-height: 1;\">.io<\u002Fdiv>\n        <div style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 15px; color: #1C1917; margin-top: 14px;\">Space Mono — Bold<\u002Fdiv>\n        <p style=\"font-family: 'Figtree', sans-serif; font-size: 11px; line-height: 1.55; color: #6E655A; margin: 6px 0 0;\">The <b>.io<\u002Fb> suffix and all technical / data labels use Space Mono — a nod to the telemetry and coordinates the platform runs on.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-family: 'Figtree', sans-serif; font-size: 10.5px; line-height: 1.55; color: #8A8175; margin: 14px 0 0;\">Both are open-source Google Fonts, so the mark can be rebuilt on any machine. Body &amp; UI copy uses <b>Figtree<\u002Fb> — see document 03.<\u002Fp>\n  <\u002Fsection>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 34px 0;\"><\u002Fdiv>\n\n  <!-- ====== 1.8 FILE FORMATS ====== -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 10px;\">1.8 — File formats &amp; export<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; margin: 0 0 18px; color: #1C1917;\">Which file, where<\u002Fh2>\n    <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n      <div style=\"display: grid; grid-template-columns: 78px 1fr; gap: 14px; background: #FAF8F4; border: 1px solid #E7E1D7; border-radius: 10px; padding: 12px 16px; break-inside: avoid;\"><span style=\"font-family: 'Space Mono', monospace; font-weight: 700; font-size: 12px; color: #C77D18;\">SVG<\u002Fspan><span style=\"font-family: 'Figtree', sans-serif; font-size: 11.5px; line-height: 1.5; color: #3A352F;\">Master format. Use everywhere on the web and in any vector workflow — infinitely scalable, tiny, editable. The source of truth.<\u002Fspan><\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 78px 1fr; gap: 14px; background: #FAF8F4; border: 1px solid #E7E1D7; border-radius: 10px; padding: 12px 16px; break-inside: avoid;\"><span style=\"font-family: 'Space Mono', monospace; font-weight: 700; font-size: 12px; color: #C77D18;\">PNG<\u002Fspan><span style=\"font-family: 'Figtree', sans-serif; font-size: 11.5px; line-height: 1.5; color: #3A352F;\">Transparent raster for slides, docs &amp; email. Export at 1× / 2× / 3×; supply 512 &amp; 1024 px symbol tiles for app stores.<\u002Fspan><\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 78px 1fr; gap: 14px; background: #FAF8F4; border: 1px solid #E7E1D7; border-radius: 10px; padding: 12px 16px; break-inside: avoid;\"><span style=\"font-family: 'Space Mono', monospace; font-weight: 700; font-size: 12px; color: #C77D18;\">JPG<\u002Fspan><span style=\"font-family: 'Figtree', sans-serif; font-size: 11.5px; line-height: 1.5; color: #3A352F;\">Only where transparency is impossible (some ad networks). Always on Paper White #FAF8F4 — never a coloured or photographic bed.<\u002Fspan><\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 78px 1fr; gap: 14px; background: #FAF8F4; border: 1px solid #E7E1D7; border-radius: 10px; padding: 12px 16px; break-inside: avoid;\"><span style=\"font-family: 'Space Mono', monospace; font-weight: 700; font-size: 12px; color: #C77D18;\">ICO<\u002Fspan><span style=\"font-family: 'Figtree', sans-serif; font-size: 11.5px; line-height: 1.5; color: #3A352F;\">Windows / browser favicon. Symbol only, multi-resolution (16 / 32 / 48 px). Generate from the 48 px PNG.<\u002Fspan><\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 78px 1fr; gap: 14px; background: #FAF8F4; border: 1px solid #E7E1D7; border-radius: 10px; padding: 12px 16px; break-inside: avoid;\"><span style=\"font-family: 'Space Mono', monospace; font-weight: 700; font-size: 12px; color: #C77D18;\">PDF<\u002Fspan><span style=\"font-family: 'Figtree', sans-serif; font-size: 11.5px; line-height: 1.5; color: #3A352F;\">Vector print master for stationery &amp; large-format. Hand to any printer; embed CMYK / PMS as specified in 1.6.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-family: 'Figtree', sans-serif; font-size: 10.5px; line-height: 1.55; color: #8A8175; margin: 14px 0 0;\">Naming convention: <span style=\"font-family: 'Space Mono', monospace; color:#6E655A;\">geobee_[lockup|symbol|wordmark]_[light|dark]_[size].[ext]<\u002Fspan> — e.g. <span style=\"font-family: 'Space Mono', monospace; color:#6E655A;\">geobee_symbol_dark_512.png<\u002Fspan>. Each colourway ships on both light and dark grounds.<\u002Fp>\n  <\u002Fsection>\n\n  <div style=\"height: 12px;\"><\u002Fdiv>\n\n<div style=\"break-before:page;\"><\u002Fdiv>\n<!-- COVER -->\n  <div style=\"font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: #C77D18; margin: 6px 0 22px;\">GeoBee.io — Brand Book<\u002Fdiv>\n  <div style=\"background: #1C1917; border-radius: 18px; padding: 40px; margin-bottom: 30px; display: flex; align-items: center; justify-content: center;\">\n    <dc-import name=\"GeoBee Mark\" variant=\"full\" mode=\"dark\" size=\"60\" hint-size=\"360px,84px\"><\u002Fdc-import>\n  <\u002Fdiv>\n  <h1 style=\"font-family: 'Sora', sans-serif; font-weight: 800; font-size: 40px; line-height: 1.04; letter-spacing: -0.035em; margin: 0 0 14px; color: #1C1917;\">02 — Brand Guidelines<\u002Fh1>\n  <p style=\"font-family: 'Figtree', sans-serif; font-size: 13px; line-height: 1.7; color: #3A352F; max-width: 470px; margin: 0 0 8px;\">Who GeoBee is, what it believes, and how it shows up. This is the master reference — the logo, colour and type specifics live in their own documents (01 &amp; 03); here we set the principles that everything else answers to.<\u002Fp>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 30px 0;\"><\u002Fdiv>\n\n  <!-- 2.1 MISSION -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 10px;\">2.1 — Purpose<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 800; font-size: 30px; letter-spacing: -0.03em; line-height: 1.12; margin: 0 0 16px; color: #1C1917;\">We turn risk into something a person can calmly act on.<\u002Fh2>\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 22px;\">\n      <div>\n        <div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:13px; color:#0E7C6B; margin-bottom:6px;\">Mission<\u002Fdiv>\n        <p style=\"font-family:'Figtree',sans-serif; font-size:12px; line-height:1.65; color:#3A352F; margin:0;\">To give every worker, team and organisation calm, real-time awareness of the risks around their people, assets and places — and the means to act before harm occurs.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:13px; color:#0E7C6B; margin-bottom:6px;\">Vision<\u002Fdiv>\n        <p style=\"font-family:'Figtree',sans-serif; font-size:12px; line-height:1.65; color:#3A352F; margin:0;\">A world where no one works unseen or unprotected — where safety is ambient, shared, and native to how organisations operate.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 30px 0;\"><\u002Fdiv>\n\n  <!-- 2.2 THE METAPHOR -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 10px;\">2.2 — The organising metaphor<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; margin: 0 0 6px; color: #1C1917;\">The hive is the model<\u002Fh2>\n    <p style=\"font-family: 'Figtree', sans-serif; font-size: 12px; line-height: 1.6; color: #3A352F; max-width: 510px; margin: 0 0 18px;\">The bumblebee and its hive aren't decoration — they are how GeoBee thinks and speaks. The whole product lexicon derives from this one idea. (Full glossary in document 04.)<\u002Fp>\n    <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;\">\n      <div style=\"border:1px solid #E7E1D7; border-radius:13px; padding:18px; break-inside:avoid;\">\n        <div style=\"width:38px; height:38px; margin-bottom:12px;\"><dc-import name=\"GeoBee Mark\" variant=\"symbol\" mode=\"light\" size=\"30\" hint-size=\"30px,38px\"><\u002Fdc-import><\u002Fdiv>\n        <div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:14px; color:#1C1917;\">The Bee<\u002Fdiv>\n        <p style=\"font-family:'Figtree',sans-serif; font-size:11px; line-height:1.55; color:#6E655A; margin:6px 0 0;\">A single worker, or an <b>asset<\u002Fb> — anything of value to protect. Small, capable, never alone.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #E7E1D7; border-radius:13px; padding:18px; break-inside:avoid;\">\n        <div style=\"width:38px; height:38px; margin-bottom:12px; display:flex; gap:2px; align-items:center;\"><svg width=\"40\" height=\"30\" viewBox=\"0 0 130 96\"><g fill=\"#1C1917\"><polygon points=\"22,4 40,4 49,26 40,48 22,48 13,26\"><\u002Fpolygon><polygon points=\"58,4 76,4 85,26 76,48 58,48 49,26\"><\u002Fpolygon><polygon points=\"40,50 58,50 67,72 58,94 40,94 31,72\"><\u002Fpolygon><\u002Fg><\u002Fsvg><\u002Fdiv>\n        <div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:14px; color:#1C1917;\">The Hive<\u002Fdiv>\n        <p style=\"font-family:'Figtree',sans-serif; font-size:11px; line-height:1.55; color:#6E655A; margin:6px 0 0;\">A team, division or whole organisation — a meaningful grouping of bees that shares awareness &amp; protection.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #E7E1D7; border-radius:13px; padding:18px; break-inside:avoid;\">\n        <div style=\"width:38px; height:38px; margin-bottom:12px; display:flex; align-items:center; justify-content:center; background:#FFC107; border-radius:9px;\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1C1917\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2 L20 6 V12 C20 17 16 21 12 22 C8 21 4 17 4 12 V6 Z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:14px; color:#1C1917;\">The Guardian<\u002Fdiv>\n        <p style=\"font-family:'Figtree',sans-serif; font-size:11px; line-height:1.55; color:#6E655A; margin:6px 0 0;\">GeoBee itself — the instinct of the hive to watch, warn and protect its own. Duty, made operational.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 30px 0;\"><\u002Fdiv>\n\n  <!-- 2.3 PRINCIPLES -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 10px;\">2.3 — Brand principles<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; margin: 0 0 18px; color: #1C1917;\">Five commitments<\u002Fh2>\n    <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n      <div style=\"display:grid; grid-template-columns:30px 1fr; gap:14px; border:1px solid #E7E1D7; border-radius:12px; padding:16px 18px; break-inside:avoid;\"><div style=\"font-family:'Space Mono',monospace; font-weight:700; font-size:14px; color:#FFC107; background:#1C1917; border-radius:7px; width:30px; height:30px; display:flex; align-items:center; justify-content:center;\">01<\u002Fdiv><div><div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:14px; color:#1C1917;\">Calm over concern<\u002Fdiv><p style=\"font-family:'Figtree',sans-serif; font-size:11.5px; line-height:1.55; color:#6E655A; margin:4px 0 0;\">We reduce anxiety, never manufacture it. We inform and enable action; we do not alarm. Tone is a steady hand, not a siren.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:30px 1fr; gap:14px; border:1px solid #E7E1D7; border-radius:12px; padding:16px 18px; break-inside:avoid;\"><div style=\"font-family:'Space Mono',monospace; font-weight:700; font-size:14px; color:#FFC107; background:#1C1917; border-radius:7px; width:30px; height:30px; display:flex; align-items:center; justify-content:center;\">02<\u002Fdiv><div><div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:14px; color:#1C1917;\">Protect the individual<\u002Fdiv><p style=\"font-family:'Figtree',sans-serif; font-size:11.5px; line-height:1.55; color:#6E655A; margin:4px 0 0;\">Every bee matters. The lone worker gets the same care as the enterprise. Safety is never a privilege of scale.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:30px 1fr; gap:14px; border:1px solid #E7E1D7; border-radius:12px; padding:16px 18px; break-inside:avoid;\"><div style=\"font-family:'Space Mono',monospace; font-weight:700; font-size:14px; color:#FFC107; background:#1C1917; border-radius:7px; width:30px; height:30px; display:flex; align-items:center; justify-content:center;\">03<\u002Fdiv><div><div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:14px; color:#1C1917;\">Clarity is safety<\u002Fdiv><p style=\"font-family:'Figtree',sans-serif; font-size:11.5px; line-height:1.55; color:#6E655A; margin:4px 0 0;\">In a risk moment, ambiguity is dangerous. We design for the fastest possible understanding — plain words, clear signal, no clutter.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:30px 1fr; gap:14px; border:1px solid #E7E1D7; border-radius:12px; padding:16px 18px; break-inside:avoid;\"><div style=\"font-family:'Space Mono',monospace; font-weight:700; font-size:14px; color:#FFC107; background:#1C1917; border-radius:7px; width:30px; height:30px; display:flex; align-items:center; justify-content:center;\">04<\u002Fdiv><div><div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:14px; color:#1C1917;\">Earn trust, keep it<\u002Fdiv><p style=\"font-family:'Figtree',sans-serif; font-size:11.5px; line-height:1.55; color:#6E655A; margin:4px 0 0;\">We handle people's location and safety data. We are transparent, precise, and never careless with that responsibility.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:30px 1fr; gap:14px; border:1px solid #E7E1D7; border-radius:12px; padding:16px 18px; break-inside:avoid;\"><div style=\"font-family:'Space Mono',monospace; font-weight:700; font-size:14px; color:#FFC107; background:#1C1917; border-radius:7px; width:30px; height:30px; display:flex; align-items:center; justify-content:center;\">05<\u002Fdiv><div><div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:14px; color:#1C1917;\">Stronger together<\u002Fdiv><p style=\"font-family:'Figtree',sans-serif; font-size:11.5px; line-height:1.55; color:#6E655A; margin:4px 0 0;\">Awareness shared across a hive protects everyone in it. The network is the product; collective safety beats individual vigilance.<\u002Fp><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 30px 0;\"><\u002Fdiv>\n\n  <!-- 2.4 PERSONALITY -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 10px;\">2.4 — Personality<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; margin: 0 0 16px; color: #1C1917;\">We are, we are not<\u002Fh2>\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 14px;\">\n      <div style=\"background:#EAF4EE; border-radius:13px; padding:18px 20px; break-inside:avoid;\">\n        <div style=\"font-family:'Space Mono',monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:#0E7C6B; margin-bottom:10px;\">We are<\u002Fdiv>\n        <div style=\"display:flex; flex-wrap:wrap; gap:7px;\">\n          <span style=\"font-family:'Figtree',sans-serif; font-weight:600; font-size:11.5px; color:#0A5A4E; background:#fff; border-radius:999px; padding:5px 12px;\">Calm<\u002Fspan>\n          <span style=\"font-family:'Figtree',sans-serif; font-weight:600; font-size:11.5px; color:#0A5A4E; background:#fff; border-radius:999px; padding:5px 12px;\">Vigilant<\u002Fspan>\n          <span style=\"font-family:'Figtree',sans-serif; font-weight:600; font-size:11.5px; color:#0A5A4E; background:#fff; border-radius:999px; padding:5px 12px;\">Warm<\u002Fspan>\n          <span style=\"font-family:'Figtree',sans-serif; font-weight:600; font-size:11.5px; color:#0A5A4E; background:#fff; border-radius:999px; padding:5px 12px;\">Precise<\u002Fspan>\n          <span style=\"font-family:'Figtree',sans-serif; font-weight:600; font-size:11.5px; color:#0A5A4E; background:#fff; border-radius:999px; padding:5px 12px;\">Dependable<\u002Fspan>\n          <span style=\"font-family:'Figtree',sans-serif; font-weight:600; font-size:11.5px; color:#0A5A4E; background:#fff; border-radius:999px; padding:5px 12px;\">Grounded<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#F6ECEA; border-radius:13px; padding:18px 20px; break-inside:avoid;\">\n        <div style=\"font-family:'Space Mono',monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:#C0392B; margin-bottom:10px;\">We are not<\u002Fdiv>\n        <div style=\"display:flex; flex-wrap:wrap; gap:7px;\">\n          <span style=\"font-family:'Figtree',sans-serif; font-weight:600; font-size:11.5px; color:#9A3427; background:#fff; border-radius:999px; padding:5px 12px;\">Alarmist<\u002Fspan>\n          <span style=\"font-family:'Figtree',sans-serif; font-weight:600; font-size:11.5px; color:#9A3427; background:#fff; border-radius:999px; padding:5px 12px;\">Cold / clinical<\u002Fspan>\n          <span style=\"font-family:'Figtree',sans-serif; font-weight:600; font-size:11.5px; color:#9A3427; background:#fff; border-radius:999px; padding:5px 12px;\">Militaristic<\u002Fspan>\n          <span style=\"font-family:'Figtree',sans-serif; font-weight:600; font-size:11.5px; color:#9A3427; background:#fff; border-radius:999px; padding:5px 12px;\">Hype-driven<\u002Fspan>\n          <span style=\"font-family:'Figtree',sans-serif; font-weight:600; font-size:11.5px; color:#9A3427; background:#fff; border-radius:999px; padding:5px 12px;\">Fear-selling<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-family:'Figtree',sans-serif; font-size:10.5px; line-height:1.55; color:#8A8175; margin:14px 0 0;\">The full voice system, do/don't phrasing and the hive lexicon are in document <b>04 · Brand Voice &amp; Lexicon<\u002Fb>.<\u002Fp>\n  <\u002Fsection>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 30px 0;\"><\u002Fdiv>\n\n  <!-- 2.5 LOGO AT A GLANCE -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 10px;\">2.5 — The logo at a glance<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; margin: 0 0 6px; color: #1C1917;\">One mark, used with discipline<\u002Fh2>\n    <p style=\"font-family: 'Figtree', sans-serif; font-size: 12px; line-height: 1.6; color: #3A352F; max-width: 500px; margin: 0 0 16px;\">A summary only — full construction, clear space, misuse and formats are specified in document <b>01 · Logo &amp; Symbol<\u002Fb>.<\u002Fp>\n    <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom:12px;\">\n      <div style=\"background:#FAF8F4; border:1px solid #E7E1D7; border-radius:12px; padding:20px; display:flex; align-items:center; justify-content:center; min-height:70px;\"><dc-import name=\"GeoBee Mark\" variant=\"full\" mode=\"light\" size=\"26\" hint-size=\"150px,36px\"><\u002Fdc-import><\u002Fdiv>\n      <div style=\"background:#FAF8F4; border:1px solid #E7E1D7; border-radius:12px; padding:20px; display:flex; align-items:center; justify-content:center; min-height:70px;\"><dc-import name=\"GeoBee Mark\" variant=\"symbol\" mode=\"light\" size=\"42\" hint-size=\"42px,54px\"><\u002Fdc-import><\u002Fdiv>\n      <div style=\"background:#1C1917; border-radius:12px; padding:20px; display:flex; align-items:center; justify-content:center; min-height:70px;\"><dc-import name=\"GeoBee Mark\" variant=\"full\" mode=\"dark\" size=\"26\" hint-size=\"150px,36px\"><\u002Fdc-import><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:10px; flex-wrap:wrap;\">\n      <span style=\"font-family:'Space Mono',monospace; font-size:10px; color:#3A352F; background:#FAF8F4; border:1px solid #E7E1D7; border-radius:8px; padding:7px 12px;\">Clear space = 1 bee height<\u002Fspan>\n      <span style=\"font-family:'Space Mono',monospace; font-size:10px; color:#3A352F; background:#FAF8F4; border:1px solid #E7E1D7; border-radius:8px; padding:7px 12px;\">Min lockup 24px / 10mm<\u002Fspan>\n      <span style=\"font-family:'Space Mono',monospace; font-size:10px; color:#3A352F; background:#FAF8F4; border:1px solid #E7E1D7; border-radius:8px; padding:7px 12px;\">Symbol below 24px<\u002Fspan>\n      <span style=\"font-family:'Space Mono',monospace; font-size:10px; color:#3A352F; background:#FAF8F4; border:1px solid #E7E1D7; border-radius:8px; padding:7px 12px;\">Never stretch · rotate · recolour<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 30px 0;\"><\u002Fdiv>\n\n  <!-- 2.6 TRADEMARK & COPYRIGHT -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 10px;\">2.6 — Trademark &amp; copyright<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; margin: 0 0 16px; color: #1C1917;\">Protecting the marks<\u002Fh2>\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom:14px;\">\n      <div style=\"border:1px solid #E7E1D7; border-radius:12px; padding:18px 20px; break-inside:avoid;\">\n        <div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:13px; color:#1C1917; margin-bottom:8px;\">The word marks<\u002Fdiv>\n        <p style=\"font-family:'Figtree',sans-serif; font-size:11px; line-height:1.6; color:#3A352F; margin:0 0 8px;\"><b>GeoBee<\u002Fb>™ and <b>GeoBee.io<\u002Fb>™ are trademarks of GeoBee Ltd. Use ™ on first or most prominent mention until registration completes, then ®.<\u002Fp>\n        <p style=\"font-family:'Figtree',sans-serif; font-size:11px; line-height:1.6; color:#3A352F; margin:0;\">Always keep the medial capitals (see 01.1). Never translate, abbreviate, pluralise or use as a verb.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #E7E1D7; border-radius:12px; padding:18px 20px; break-inside:avoid;\">\n        <div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:13px; color:#1C1917; margin-bottom:8px;\">The visual identity<\u002Fdiv>\n        <p style=\"font-family:'Figtree',sans-serif; font-size:11px; line-height:1.6; color:#3A352F; margin:0 0 8px;\">The logo, symbol and this brand system are © 2026 GeoBee Ltd. All rights reserved. The bee/hive symbol is a protected design element.<\u002Fp>\n        <p style=\"font-family:'Figtree',sans-serif; font-size:11px; line-height:1.6; color:#3A352F; margin:0;\">Third parties may use the assets only per a written brand-use agreement and the rules in this book.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#1C1917; border-radius:12px; padding:16px 20px;\">\n      <div style=\"font-family:'Space Mono',monospace; font-size:9.5px; letter-spacing:0.08em; text-transform:uppercase; color:#FFC107; margin-bottom:8px;\">Approved attribution lines<\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace; font-size:10px; line-height:1.9; color:#C9C2B8;\">GeoBee™ and the GeoBee bee symbol are trademarks of GeoBee Ltd.<br>© 2026 GeoBee Ltd. All rights reserved. &nbsp;·&nbsp; GeoBee.io™<\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-family:'Figtree',sans-serif; font-size:10.5px; line-height:1.55; color:#8A8175; margin:14px 0 0;\">Report misuse or request permission: <b style=\"color:#3A352F;\">brand@geobee.io<\u002Fb>. Company details, registration numbers and jurisdictions to be completed by legal on incorporation.<\u002Fp>\n  <\u002Fsection>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 30px 0;\"><\u002Fdiv>\n\n  <!-- 2.7 THE BOOK -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 10px;\">2.7 — The brand book<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; margin: 0 0 16px; color: #1C1917;\">What's in the set<\u002Fh2>\n    <div style=\"display:flex; flex-direction:column; gap:8px;\">\n      <div style=\"display:grid; grid-template-columns:44px 1fr; gap:14px; background:#FAF8F4; border:1px solid #E7E1D7; border-radius:10px; padding:12px 16px; break-inside:avoid;\"><span style=\"font-family:'Space Mono',monospace; font-weight:700; font-size:13px; color:#C77D18;\">01<\u002Fspan><div><span style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:12.5px; color:#1C1917;\">Logo &amp; Symbol<\u002Fspan><span style=\"font-family:'Figtree',sans-serif; font-size:11px; color:#6E655A;\"> — naming, construction, clear space, misuse, formats<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:44px 1fr; gap:14px; background:#FFF8E8; border:1px solid #F0E0B8; border-radius:10px; padding:12px 16px; break-inside:avoid;\"><span style=\"font-family:'Space Mono',monospace; font-weight:700; font-size:13px; color:#C77D18;\">02<\u002Fspan><div><span style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:12.5px; color:#1C1917;\">Brand Guidelines<\u002Fspan><span style=\"font-family:'Figtree',sans-serif; font-size:11px; color:#6E655A;\"> — this document: purpose, principles, personality, trademark<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:44px 1fr; gap:14px; background:#FAF8F4; border:1px solid #E7E1D7; border-radius:10px; padding:12px 16px; break-inside:avoid;\"><span style=\"font-family:'Space Mono',monospace; font-weight:700; font-size:13px; color:#C77D18;\">03<\u002Fspan><div><span style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:12.5px; color:#1C1917;\">Colour &amp; Typography<\u002Fspan><span style=\"font-family:'Figtree',sans-serif; font-size:11px; color:#6E655A;\"> — full palette, tints, semantic states, type scale<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:44px 1fr; gap:14px; background:#FAF8F4; border:1px solid #E7E1D7; border-radius:10px; padding:12px 16px; break-inside:avoid;\"><span style=\"font-family:'Space Mono',monospace; font-weight:700; font-size:13px; color:#C77D18;\">04<\u002Fspan><div><span style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:12.5px; color:#1C1917;\">Brand Voice &amp; Lexicon<\u002Fspan><span style=\"font-family:'Figtree',sans-serif; font-size:11px; color:#6E655A;\"> — tone, messaging, the bee/hive vocabulary<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:44px 1fr; gap:14px; background:#FAF8F4; border:1px solid #E7E1D7; border-radius:10px; padding:12px 16px; break-inside:avoid;\"><span style=\"font-family:'Space Mono',monospace; font-weight:700; font-size:13px; color:#C77D18;\">05<\u002Fspan><div><span style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:12.5px; color:#1C1917;\">Applications<\u002Fspan><span style=\"font-family:'Fi
