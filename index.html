rder-radius:7px;\"><\u002Fdiv><div style=\"font-family:'Space Mono',monospace; font-size:7.5px; color:#6E655A; margin-top:4px; text-align:center;\">deep<br>#2A3F5C<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'Space Mono',monospace; font-size:9px; line-height:1.7; color:#6E655A; margin-top:12px;\">RGB 61·90·128<br>CMYK 52·30·0·50<br>PMS 5405 C<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background: #1C1917; border-radius: 12px; padding: 16px 18px;\">\n          <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;\">\n            <dc-import name=\"GeoBee Mark\" variant=\"full\" mode=\"dark\" size=\"20\" hint-size=\"120px,28px\"><\u002Fdc-import>\n            <span style=\"font-family:'Space Mono',monospace; font-size:8px; letter-spacing:0.1em; color:#8FB0DE; background:rgba(61,90,128,0.28); border:1px solid #3D5A80; border-radius:5px; padding:3px 8px;\">● ALL SAFE<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-family:'Figtree',sans-serif; font-size:10.5px; color:#C9C2B8; line-height:1.5; margin-bottom:12px;\">Asset <b style=\"color:#FAF8F4;\">Hive-North<\u002Fb> is monitored. 0 alerts in the last 24h.<\u002Fdiv>\n          <div style=\"display:flex; gap:8px;\">\n            <span style=\"font-family:'Figtree',sans-serif; font-weight:600; font-size:10px; color:#fff; background:#3D5A80; border-radius:7px; padding:6px 13px;\">View map<\u002Fspan>\n            <span style=\"font-family:'Figtree',sans-serif; font-weight:600; font-size:10px; color:#1C1917; background:#FFC107; border-radius:7px; padding:6px 13px;\">⚠ Raise alert<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-family: 'Figtree', sans-serif; font-size: 10.5px; line-height: 1.55; color: #8A8175; margin: 14px 0 0;\">My lean: <b>Calm Teal<\u002Fb> — it belongs to the natural, hive-and-field world of the brand and sits more warmly beside Hive Yellow, while still reading unmistakably as “safe”. <b>Slate Blue<\u002Fb> is the safer enterprise cliché if the audience skews security-committee. Tell me A or B and I lock it through every remaining document.<\u002Fp>\n  <\u002Fsection>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 30px 0;\"><\u002Fdiv>\n\n  <!-- 3.4 SEMANTIC STATES -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 10px;\">3.4 — Semantic risk states<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; margin: 0 0 6px; color: #1C1917;\">A calm ladder from safe to critical<\u002Fh2>\n    <p style=\"font-family: 'Figtree', sans-serif; font-size: 12px; line-height: 1.6; color: #3A352F; max-width: 500px; margin: 0 0 18px;\">Risk is communicated with restraint. Yellow is caution — not panic. Red is used sparingly and only for genuine emergencies. (Accent shown as Calm Teal; swaps to your chosen accent.)<\u002Fp>\n    <div style=\"display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;\">\n      <div style=\"border:1px solid #E7E1D7; border-radius:11px; overflow:hidden; break-inside:avoid;\"><div style=\"background:#0E7C6B; height:46px;\"><\u002Fdiv><div style=\"padding:10px 12px;\"><div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:11.5px; color:#1C1917;\">Safe / Monitored<\u002Fdiv><div style=\"font-family:'Space Mono',monospace; font-size:8.5px; color:#6E655A; margin-top:4px;\">#0E7C6B<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"border:1px solid #E7E1D7; border-radius:11px; overflow:hidden; break-inside:avoid;\"><div style=\"background:#FFC107; height:46px;\"><\u002Fdiv><div style=\"padding:10px 12px;\"><div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:11.5px; color:#1C1917;\">Caution<\u002Fdiv><div style=\"font-family:'Space Mono',monospace; font-size:8.5px; color:#6E655A; margin-top:4px;\">#FFC107<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"border:1px solid #E7E1D7; border-radius:11px; overflow:hidden; break-inside:avoid;\"><div style=\"background:#E8833A; height:46px;\"><\u002Fdiv><div style=\"padding:10px 12px;\"><div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:11.5px; color:#1C1917;\">Elevated<\u002Fdiv><div style=\"font-family:'Space Mono',monospace; font-size:8.5px; color:#6E655A; margin-top:4px;\">#E8833A<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"border:1px solid #E7E1D7; border-radius:11px; overflow:hidden; break-inside:avoid;\"><div style=\"background:#C0392B; height:46px;\"><\u002Fdiv><div style=\"padding:10px 12px;\"><div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:11.5px; color:#1C1917;\">Critical<\u002Fdiv><div style=\"font-family:'Space Mono',monospace; font-size:8.5px; color:#6E655A; margin-top:4px;\">#C0392B<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 30px 0;\"><\u002Fdiv>\n\n  <!-- 3.5 TYPE FAMILIES -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 10px;\">3.5 — Type families<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; margin: 0 0 18px; color: #1C1917;\">Three voices, one system<\u002Fh2>\n    <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n      <div style=\"border:1px solid #E7E1D7; border-radius:14px; padding:20px 24px; break-inside:avoid;\">\n        <div style=\"display:flex; align-items:baseline; justify-content:space-between;\"><div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:34px; letter-spacing:-0.02em; color:#1C1917;\">Sora<\u002Fdiv><div style=\"font-family:'Space Mono',monospace; font-size:9.5px; color:#6E655A;\">DISPLAY · HEADLINES · WORDMARK<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-family:'Sora',sans-serif; font-size:15px; color:#3A352F; margin-top:8px;\">Regular · Medium · SemiBold · Bold · ExtraBold<\u002Fdiv>\n        <p style=\"font-family:'Figtree',sans-serif; font-size:11px; line-height:1.55; color:#6E655A; margin:8px 0 0;\">Geometric, engineered, calm. Every heading and the logo. Weights 600–800 for display; tight tracking (−0.02 to −0.035em).<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #E7E1D7; border-radius:14px; padding:20px 24px; break-inside:avoid;\">\n        <div style=\"display:flex; align-items:baseline; justify-content:space-between;\"><div style=\"font-family:'Figtree',sans-serif; font-weight:600; font-size:34px; letter-spacing:-0.01em; color:#1C1917;\">Figtree<\u002Fdiv><div style=\"font-family:'Space Mono',monospace; font-size:9.5px; color:#6E655A;\">BODY · UI · LONG-FORM<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-family:'Figtree',sans-serif; font-size:15px; color:#3A352F; margin-top:8px;\">Regular · Medium · SemiBold · Bold<\u002Fdiv>\n        <p style=\"font-family:'Figtree',sans-serif; font-size:11px; line-height:1.55; color:#6E655A; margin:8px 0 0;\">Humanist, warm, friendly — the “calm over concern” voice. All running text, interface copy and captions.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #E7E1D7; border-radius:14px; padding:20px 24px; break-inside:avoid;\">\n        <div style=\"display:flex; align-items:baseline; justify-content:space-between;\"><div style=\"font-family:'Space Mono',monospace; font-weight:700; font-size:30px; color:#1C1917;\">Space Mono<\u002Fdiv><div style=\"font-family:'Space Mono',monospace; font-size:9.5px; color:#6E655A;\">DATA · COORDS · LABELS · .io<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace; font-size:14px; color:#3A352F; margin-top:8px;\">Regular · Bold<\u002Fdiv>\n        <p style=\"font-family:'Figtree',sans-serif; font-size:11px; line-height:1.55; color:#6E655A; margin:8px 0 0;\">Telemetry &amp; technical accents: coordinates, timestamps, metric labels, the <b>.io<\u002Fb> suffix. Use sparingly, uppercase, wide tracking.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 30px 0;\"><\u002Fdiv>\n\n  <!-- 3.6 TYPE SCALE -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 10px;\">3.6 — Type scale &amp; specimen<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; margin: 0 0 18px; color: #1C1917;\">The working hierarchy<\u002Fh2>\n    <div style=\"border:1px solid #E7E1D7; border-radius:14px; padding:24px 26px; break-inside:avoid;\">\n      <div style=\"font-family:'Sora',sans-serif; font-weight:800; font-size:38px; letter-spacing:-0.035em; color:#1C1917; line-height:1.05;\">Calm over concern.<\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace; font-size:8.5px; color:#A79E92; margin:3px 0 16px;\">H1 · Sora ExtraBold · 38/40 · −0.035em<\u002Fdiv>\n      <div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:24px; letter-spacing:-0.02em; color:#1C1917;\">Every worker is a bee; every team, a hive.<\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace; font-size:8.5px; color:#A79E92; margin:3px 0 16px;\">H2 · Sora Bold · 24/28 · −0.02em<\u002Fdiv>\n      <div style=\"font-family:'Sora',sans-serif; font-weight:600; font-size:16px; color:#1C1917;\">Observability for people, assets and place<\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace; font-size:8.5px; color:#A79E92; margin:3px 0 16px;\">H3 · Sora SemiBold · 16/22<\u002Fdiv>\n      <div style=\"font-family:'Figtree',sans-serif; font-size:12.5px; line-height:1.7; color:#3A352F; max-width:440px;\">Body copy is set in Figtree at 12–13px with generous 1.7 line-height. It should feel like a steady hand on the shoulder — clear, unhurried, never alarmist. GeoBee turns risk into something a person can calmly act on.<\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace; font-size:8.5px; color:#A79E92; margin:3px 0 16px;\">Body · Figtree Regular · 12.5/21<\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:#C77D18;\">51.5074° N · 0.1278° W · HIVE-NORTH<\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace; font-size:8.5px; color:#A79E92; margin:3px 0 0;\">Label · Space Mono · 10px · 0.12em · uppercase<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"height: 12px;\"><\u002Fdiv>\n\n<div style=\"break-before:page;\"><\u002Fdiv>\n<!-- COVER -->\n  <div style=\"font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: #C77D18; margin: 6px 0 22px;\">GeoBee.io — Brand Book<\u002Fdiv>\n  <h1 style=\"font-family: 'Sora', sans-serif; font-weight: 800; font-size: 40px; line-height: 1.04; letter-spacing: -0.035em; margin: 0 0 14px; color: #1C1917;\">04 — Brand Voice &amp; Lexicon<\u002Fh1>\n  <p style=\"font-family: 'Figtree', sans-serif; font-size: 13px; line-height: 1.7; color: #3A352F; max-width: 470px; margin: 0 0 8px;\">How GeoBee sounds, and the words it uses. The voice keeps <b>calm over concern<\u002Fb> in every sentence; the lexicon borrows from the hive so the product, the docs and the sales conversation all speak one coherent language.<\u002Fp>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 30px 0;\"><\u002Fdiv>\n\n  <!-- 4.1 VOICE PILLARS -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 10px;\">4.1 — Voice pillars<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; margin: 0 0 18px; color: #1C1917;\">Four dials, always set the same way<\u002Fh2>\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px;\">\n      <div style=\"border:1px solid #E7E1D7; border-radius:13px; padding:18px 20px; break-inside:avoid;\"><div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:14px; color:#1C1917;\">Steady, not urgent<\u002Fdiv><p style=\"font-family:'Figtree',sans-serif; font-size:11px; line-height:1.55; color:#6E655A; margin:6px 0 0;\">We write like the calm voice on the radio in a crisis. Short, clear, composed — even when the news is serious.<\u002Fp><\u002Fdiv>\n      <div style=\"border:1px solid #E7E1D7; border-radius:13px; padding:18px 20px; break-inside:avoid;\"><div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:14px; color:#1C1917;\">Warm, not soft<\u002Fdiv><p style=\"font-family:'Figtree',sans-serif; font-size:11px; line-height:1.55; color:#6E655A; margin:6px 0 0;\">Human and kind, but never vague. Warmth earns trust; precision keeps it. We care, and we're exact.<\u002Fp><\u002Fdiv>\n      <div style=\"border:1px solid #E7E1D7; border-radius:13px; padding:18px 20px; break-inside:avoid;\"><div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:14px; color:#1C1917;\">Plain, not dumbed-down<\u002Fdiv><p style=\"font-family:'Figtree',sans-serif; font-size:11px; line-height:1.55; color:#6E655A; margin:6px 0 0;\">Everyday words for everyday people; exact terms when precision matters. We respect the reader's time and intelligence.<\u002Fp><\u002Fdiv>\n      <div style=\"border:1px solid #E7E1D7; border-radius:13px; padding:18px 20px; break-inside:avoid;\"><div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:14px; color:#1C1917;\">Confident, not boastful<\u002Fdiv><p style=\"font-family:'Figtree',sans-serif; font-size:11px; line-height:1.55; color:#6E655A; margin:6px 0 0;\">We show competence through clarity, not superlatives. No hype, no fear-selling, no “revolutionary”.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 30px 0;\"><\u002Fdiv>\n\n  <!-- 4.2 SAY / DONT -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 10px;\">4.2 — Say this, not that<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; margin: 0 0 18px; color: #1C1917;\">Calm over concern, in practice<\u002Fh2>\n    <div style=\"display:flex; flex-direction:column; gap:10px;\">\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px; break-inside:avoid;\">\n        <div style=\"background:#EAF4EE; border-radius:11px; padding:14px 16px;\"><div style=\"font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.08em; text-transform:uppercase; color:#0E7C6B; margin-bottom:6px;\">✓ We say<\u002Fdiv><div style=\"font-family:'Figtree',sans-serif; font-size:12px; line-height:1.5; color:#1C1917;\">“Aisha checked in safe at 14:03.”<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#F6ECEA; border-radius:11px; padding:14px 16px;\"><div style=\"font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.08em; text-transform:uppercase; color:#C0392B; margin-bottom:6px;\">✕ Not<\u002Fdiv><div style=\"font-family:'Figtree',sans-serif; font-size:12px; line-height:1.5; color:#8A8175;\">“No fatalities reported at site 14.”<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px; break-inside:avoid;\">\n        <div style=\"background:#EAF4EE; border-radius:11px; padding:14px 16px;\"><div style=\"font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.08em; text-transform:uppercase; color:#0E7C6B; margin-bottom:6px;\">✓ We say<\u002Fdiv><div style=\"font-family:'Figtree',sans-serif; font-size:12px; line-height:1.5; color:#1C1917;\">“Raised risk near the north gate. Here's what to do.”<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#F6ECEA; border-radius:11px; padding:14px 16px;\"><div style=\"font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.08em; text-transform:uppercase; color:#C0392B; margin-bottom:6px;\">✕ Not<\u002Fdiv><div style=\"font-family:'Figtree',sans-serif; font-size:12px; line-height:1.5; color:#8A8175;\">“⚠ DANGER! Threat detected immediately!!”<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px; break-inside:avoid;\">\n        <div style=\"background:#EAF4EE; border-radius:11px; padding:14px 16px;\"><div style=\"font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.08em; text-transform:uppercase; color:#0E7C6B; margin-bottom:6px;\">✓ We say<\u002Fdiv><div style=\"font-family:'Figtree',sans-serif; font-size:12px; line-height:1.5; color:#1C1917;\">“Your hive is fully monitored. All 12 bees are accounted for.”<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#F6ECEA; border-radius:11px; padding:14px 16px;\"><div style=\"font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.08em; text-transform:uppercase; color:#C0392B; margin-bottom:6px;\">✕ Not<\u002Fdiv><div style=\"font-family:'Figtree',sans-serif; font-size:12px; line-height:1.5; color:#8A8175;\">“Surveillance active on all 12 assets.”<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px; break-inside:avoid;\">\n        <div style=\"background:#EAF4EE; border-radius:11px; padding:14px 16px;\"><div style=\"font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.08em; text-transform:uppercase; color:#0E7C6B; margin-bottom:6px;\">✓ We say<\u002Fdiv><div style=\"font-family:'Figtree',sans-serif; font-size:12px; line-height:1.5; color:#1C1917;\">“Let's get you set up in a few minutes.”<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#F6ECEA; border-radius:11px; padding:14px 16px;\"><div style=\"font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.08em; text-transform:uppercase; color:#C0392B; margin-bottom:6px;\">✕ Not<\u002Fdiv><div style=\"font-family:'Figtree',sans-serif; font-size:12px; line-height:1.5; color:#8A8175;\">“Complete mandatory onboarding to activate protection.”<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 30px 0;\"><\u002Fdiv>\n\n  <!-- 4.3 TAGLINES -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 10px;\">4.3 — Taglines &amp; boilerplate<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; margin: 0 0 16px; color: #1C1917;\">Lines to use<\u002Fh2>\n    <div style=\"background:#1C1917; border-radius:14px; padding:26px 28px; margin-bottom:14px;\">\n      <div style=\"font-family:'Sora',sans-serif; font-weight:800; font-size:26px; letter-spacing:-0.03em; color:#FAF8F4; line-height:1.15;\">Calm over concern.<\u002Fdiv>\n      <div style=\"font-family:'Figtree',sans-serif; font-size:12px; color:#A79E92; margin-top:6px;\">Primary tagline — the whole brand in three words.<\u002Fdiv>\n      <div style=\"height:1px; background:#332E29; margin:18px 0;\"><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px;\">\n        <div><div style=\"font-family:'Sora',sans-serif; font-weight:600; font-size:15px; color:#FFC107;\">Every bee protected. Every hive aware.<\u002Fdiv><div style=\"font-family:'Figtree',sans-serif; font-size:10.5px; color:#8A8175; margin-top:4px;\">Product / capability line.<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:'Sora',sans-serif; font-weight:600; font-size:15px; color:#FFC107;\">See the risk. Keep the calm.<\u002Fdiv><div style=\"font-family:'Figtree',sans-serif; font-size:10.5px; color:#8A8175; margin-top:4px;\">Campaign / awareness line.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #E7E1D7; border-radius:12px; padding:16px 20px;\">\n      <div style=\"font-family:'Space Mono',monospace; font-size:9.5px; letter-spacing:0.08em; text-transform:uppercase; color:#C77D18; margin-bottom:8px;\">Boilerplate — 50 words<\u002Fdiv>\n      <p style=\"font-family:'Figtree',sans-serif; font-size:12px; line-height:1.65; color:#3A352F; margin:0;\">GeoBee.io provides RiskOps and geospatial intelligence observability — machine-learning-driven operational awareness that protects people, assets and places across low- and high-risk environments. From the lone worker to the global enterprise, GeoBee helps every hive see risk early and act on it calmly.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 30px 0;\"><\u002Fdiv>\n\n  <!-- 4.4 LEXICON -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 10px;\">4.4 — The hive lexicon<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; margin: 0 0 6px; color: #1C1917;\">The domain language<\u002Fh2>\n    <p style=\"font-family: 'Figtree', sans-serif; font-size: 12px; line-height: 1.6; color: #3A352F; max-width: 510px; margin: 0 0 18px;\">These are canonical product terms. Capitalise them when naming the concept in-product (“invite a Bee to your Hive”); lowercase in ordinary prose. Use consistently — this vocabulary is a brand asset.<\u002Fp>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:10px;\">\n      <div style=\"display:grid; grid-template-columns:76px 1fr; gap:12px; border:1px solid #E7E1D7; border-radius:11px; padding:12px 14px; break-inside:avoid;\"><span style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:12.5px; color:#C77D18;\">Bee<\u002Fspan><span style=\"font-family:'Figtree',sans-serif; font-size:10.5px; line-height:1.45; color:#3A352F;\">An individual worker or a protected asset — the atomic unit of value.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:76px 1fr; gap:12px; border:1px solid #E7E1D7; border-radius:11px; padding:12px 14px; break-inside:avoid;\"><span style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:12.5px; color:#C77D18;\">Hive<\u002Fspan><span style=\"font-family:'Figtree',sans-serif; font-size:10.5px; line-height:1.45; color:#3A352F;\">A team, site, division or whole organisation — a semantic grouping of Bees.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:76px 1fr; gap:12px; border:1px solid #E7E1D7; border-radius:11px; padding:12px 14px; break-inside:avoid;\"><span style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:12.5px; color:#C77D18;\">Queen<\u002Fspan><span style=\"font-family:'Figtree',sans-serif; font-size:10.5px; line-height:1.45; color:#3A352F;\">The critical asset or person a Hive exists to protect; continuity depends on it.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:76px 1fr; gap:12px; border:1px solid #E7E1D7; border-radius:11px; padding:12px 14px; break-inside:avoid;\"><span style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:12.5px; color:#C77D18;\">Cell<\u002Fspan><span style=\"font-family:'Figtree',sans-serif; font-size:10.5px; line-height:1.45; color:#3A352F;\">A defined zone or geofence — one cell of the monitored map.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:76px 1fr; gap:12px; border:1px solid #E7E1D7; border-radius:11px; padding:12px 14px; break-inside:avoid;\"><span style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:12.5px; color:#C77D18;\">Forage<\u002Fspan><span style=\"font-family:'Figtree',sans-serif; font-size:10.5px; line-height:1.45; color:#3A352F;\">A Bee working out in the field, beyond the home Hive — lone/remote work.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:76px 1fr; gap:12px; border:1px solid #E7E1D7; border-radius:11px; padding:12px 14px; break-inside:avoid;\"><span style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:12.5px; color:#C77D18;\">Waggle<\u002Fspan><span style=\"font-family:'Figtree',sans-serif; font-size:10.5px; line-height:1.45; color:#3A352F;\">A check-in or status signal a Bee sends back to the Hive.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:76px 1fr; gap:12px; border:1px solid #E7E1D7; border-radius:11px; padding:12px 14px; break-inside:avoid;\"><span style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:12.5px; color:#C77D18;\">Guardian<\u002Fspan><span style=\"font-family:'Figtree',sans-serif; font-size:10.5px; line-height:1.45; color:#3A352F;\">The GeoBee watch layer — the always-on protective intelligence.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:76px 1fr; gap:12px; border:1px solid #E7E1D7; border-radius:11px; padding:12px 14px; break-inside:avoid;\"><span style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:12.5px; color:#C77D18;\">Sting<\u002Fspan><span style=\"font-family:'Figtree',sans-serif; font-size:10.5px; line-height:1.45; color:#3A352F;\">An escalation / SOS — a Bee's defensive alert when threatened.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:76px 1fr; gap:12px; border:1px solid #E7E1D7; border-radius:11px; padding:12px 14px; break-inside:avoid;\"><span style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:12.5px; color:#C77D18;\">Swarm<\u002Fspan><span style=\"font-family:'Figtree',sans-serif; font-size:10.5px; line-height:1.45; color:#3A352F;\">Coordinated response — resources converging on an incident.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:76px 1fr; gap:12px; border:1px solid #E7E1D7; border-radius:11px; padding:12px 14px; break-inside:avoid;\"><span style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:12.5px; color:#C77D18;\">Pollen<\u002Fspan><span style=\"font-family:'Figtree',sans-serif; font-size:10.5px; line-height:1.45; color:#3A352F;\">The signal data Bees carry back — telemetry that feeds the map.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:76px 1fr; gap:12px; border:1px solid #E7E1D7; border-radius:11px; padding:12px 14px; break-inside:avoid;\"><span style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:12.5px; color:#C77D18;\">Nectar<\u002Fspan><span style=\"font-family:'Figtree',sans-serif; font-size:10.5px; line-height:1.45; color:#3A352F;\">Refined insight — the analysed intelligence GeoBee produces from Pollen.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:76px 1fr; gap:12px; border:1px solid #E7E1D7; border-radius:11px; padding:12px 14px; break-inside:avoid;\"><span style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:12.5px; color:#C77D18;\">Beekeeper<\u002Fspan><span style=\"font-family:'Figtree',sans-serif; font-size:10.5px; line-height:1.45; color:#3A352F;\">A manager / admin who oversees a Hive from the command view.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-family:'Figtree',sans-serif; font-size:10.5px; line-height:1.55; color:#8A8175; margin:14px 0 0;\">Use with a light touch in customer-facing copy — the metaphor should aid understanding, never obscure it. When in doubt, plain language wins.<\u002Fp>\n  <\u002Fsection>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 30px 0;\"><\u002Fdiv>\n\n  <!-- 4.5 AUDIENCES -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 10px;\">4.5 — Speaking to each audience<\u002Fdiv>\n    <h2 style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; margin: 0 0 16px; color: #1C1917;\">One voice, four rooms<\u002Fh2>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px;\">\n      <div style=\"border:1px solid #E7E1D7; border-radius:12px; padding:16px 18px; break-inside:avoid;\"><div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:13px; color:#1C1917;\">Lone workers<\u002Fdiv><p style=\"font-family:'Figtree',sans-serif; font-size:11px; line-height:1.55; color:#6E655A; margin:5px 0 0;\">Reassurance &amp; simplicity. “You're never really alone out there.” Lead with personal safety, not features.<\u002Fp><\u002Fdiv>\n      <div style=\"border:1px solid #E7E1D7; border-radius:12px; padding:16px 18px; break-inside:avoid;\"><div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:13px; color:#1C1917;\">SMEs<\u002Fdiv><p style=\"font-family:'Figtree',sans-serif; font-size:11px; line-height:1.55; color:#6E655A; margin:5px 0 0;\">Practicality &amp; value. “Enterprise-grade protection, set up in an afternoon.” Speak to duty of care without the overhead.<\u002Fp><\u002Fdiv>\n      <div style=\"border:1px solid #E7E1D7; border-radius:12px; padding:16px 18px; break-inside:avoid;\"><div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:13px; color:#1C1917;\">NGOs<\u002Fdiv><p style=\"font-family:'Figtree',sans-serif; font-size:11px; line-height:1.55; color:#6E655A; margin:5px 0 0;\">Mission &amp; care. “Protect the people who protect others.” Emphasise field safety, dignity and low-connectivity resilience.<\u002Fp><\u002Fdiv>\n      <div style=\"border:1px solid #E7E1D7; border-radius:12px; padding:16px 18px; break-inside:avoid;\"><div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:13px; color:#1C1917;\">Enterprise<\u002Fdiv><p style=\"font-family:'Figtree',sans-serif; font-size:11px; line-height:1.55; color:#6E655A; margin:5px 0 0;\">Rigour &amp; trust. “Observability and control across every hive.” Speak to compliance, scale and continuity — calmly, never boastfully.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"height: 12px;\"><\u002Fdiv>\n\n<div style=\"break-before:page;\"><\u002Fdiv>\n<!-- COVER -->\n  <div style=\"font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: #C77D18; margin: 6px 0 22px;\">GeoBee.io — Brand Book<\u002Fdiv>\n  <h1 style=\"font-family: 'Sora', sans-serif; font-weight: 800; font-size: 40px; line-height: 1.04; letter-spacing: -0.035em; margin: 0 0 14px; color: #1C1917;\">05a — Logo Asset Sheet<\u002Fh1>\n  <p style=\"font-family: 'Figtree', sans-serif; font-size: 13px; line-height: 1.7; color: #3A352F; max-width: 480px; margin: 0 0 8px;\">Every approved rendering in one place: the three assets, each in light and dark, plus the standalone symbol at real sizes and the export matrix. Pull artwork from here; construction rules live in document 01.<\u002Fp>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 30px 0;\"><\u002Fdiv>\n\n  <!-- 5a.1 PRIMARY LOCKUP -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 12px;\">5a.1 — Primary lockup<\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 14px;\">\n      <div style=\"break-inside:avoid;\">\n        <div style=\"background:#FAF8F4; border:1px solid #E7E1D7; border-radius:14px; padding:38px; display:flex; align-items:center; justify-content:center;\"><dc-import name=\"GeoBee Mark\" variant=\"full\" mode=\"light\" size=\"44\" hint-size=\"250px,62px\"><\u002Fdc-import><\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.06em; color:#8A8175; margin-top:8px;\">geobee_lockup_light &nbsp;·&nbsp; #FAF8F4 ground<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"break-inside:avoid;\">\n        <div style=\"background:#1C1917; border-radius:14px; padding:38px; display:flex; align-items:center; justify-content:center;\"><dc-import name=\"GeoBee Mark\" variant=\"full\" mode=\"dark\" size=\"44\" hint-size=\"250px,62px\"><\u002Fdc-import><\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.06em; color:#8A8175; margin-top:8px;\">geobee_lockup_dark &nbsp;·&nbsp; #1C1917 ground<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 26px 0;\"><\u002Fdiv>\n\n  <!-- 5a.2 SYMBOL + WORDMARK -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 12px;\">5a.2 — Symbol &amp; text wordmark<\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 14px;\">\n      <div style=\"break-inside:avoid;\">\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:10px;\">\n          <div style=\"background:#FAF8F4; border:1px solid #E7E1D7; border-radius:12px; padding:24px; display:flex; align-items:center; justify-content:center;\"><dc-import name=\"GeoBee Mark\" variant=\"symbol\" mode=\"light\" size=\"56\" hint-size=\"56px,72px\"><\u002Fdc-import><\u002Fdiv>\n          <div style=\"background:#1C1917; border-radius:12px; padding:24px; display:flex; align-items:center; justify-content:center;\"><dc-import name=\"GeoBee Mark\" variant=\"symbol\" mode=\"dark\" size=\"56\" hint-size=\"56px,72px\"><\u002Fdc-import><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.06em; color:#8A8175; margin-top:8px;\">geobee_symbol_[light|dark]<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"break-inside:avoid;\">\n        <div style=\"display:grid; grid-template-rows:1fr 1fr; gap:10px;\">\n          <div style=\"background:#FAF8F4; border:1px solid #E7E1D7; border-radius:12px; padding:16px; display:flex; align-items:center; justify-content:center;\"><dc-import name=\"GeoBee Mark\" variant=\"wordmark\" mode=\"light\" size=\"28\" hint-size=\"170px,38px\"><\u002Fdc-import><\u002Fdiv>\n          <div style=\"background:#1C1917; border-radius:12px; padding:16px; display:flex; align-items:center; justify-content:center;\"><dc-import name=\"GeoBee Mark\" variant=\"wordmark\" mode=\"dark\" size=\"28\" hint-size=\"170px,38px\"><\u002Fdc-import><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.06em; color:#8A8175; margin-top:8px;\">geobee_wordmark_[light|dark]<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 26px 0;\"><\u002Fdiv>\n\n  <!-- 5a.3 SIZE LADDER -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 6px;\">5a.3 — Symbol size ladder<\u002Fdiv>\n    <p style=\"font-family:'Figtree',sans-serif; font-size:11.5px; line-height:1.55; color:#6E655A; max-width:500px; margin:0 0 16px;\">The symbol at true rendered pixel sizes. Below 16px it holds because it's built from few, bold shapes — the reason we lead with the cell, not a detailed illustration.<\u002Fp>\n    <div style=\"background:#FAF8F4; border:1px solid #E7E1D7; border-radius:14px; padding:26px; display:flex; align-items:flex-end; gap:26px; flex-wrap:wrap;\">\n      <div style=\"display:flex; flex-direction:column; align-items:center; gap:8px;\"><dc-import name=\"GeoBee Mark\" variant=\"symbol\" mode=\"light\" size=\"64\" hint-size=\"64px,82px\"><\u002Fdc-import><span style=\"font-family:'Space Mono',monospace; font-size:9px; color:#8A8175;\">64<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; align-items:center; gap:8px;\"><dc-import name=\"GeoBee Mark\" variant=\"symbol\" mode=\"light\" size=\"48\" hint-size=\"48px,62px\"><\u002Fdc-import><span style=\"font-family:'Space Mono',monospace; font-size:9px; color:#8A8175;\">48<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; align-items:center; gap:8px;\"><dc-import name=\"GeoBee Mark\" variant=\"symbol\" mode=\"light\" size=\"32\" hint-size=\"32px,41px\"><\u002Fdc-import><span style=\"font-family:'Space Mono',monospace; font-size:9px; color:#8A8175;\">32<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; align-items:center; gap:8px;\"><dc-import name=\"GeoBee Mark\" variant=\"symbol\" mode=\"light\" size=\"24\" hint-size=\"24px,31px\"><\u002Fdc-import><span style=\"font-family:'Space Mono',monospace; font-size:9px; color:#8A8175;\">24<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; align-items:center; gap:8px;\"><dc-import name=\"GeoBee Mark\" variant=\"symbol\" mode=\"light\" size=\"16\" hint-size=\"16px,21px\"><\u002Fdc-import><span style=\"font-family:'Space Mono',monospace; font-size:9px; color:#8A8175;\">16<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"border-top: 1px solid #E7E1D7; margin: 26px 0;\"><\u002Fdiv>\n\n  <!-- 5a.4 EXPORT MATRIX -->\n  <section>\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #C77D18; margin-bottom: 12px;\">5a.4 — Export matrix<\u002Fdiv>\n    <div style=\"border:1px solid #E7E1D7; border-radius:12px; overflow:hidden;\">\n      <div style=\"display:grid; grid-template-columns:1.4fr 1fr 1fr 1fr 1.3fr; background:#1C1917;\">\n        <div style=\"font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.08em; text-transform:uppercase; color:#FFC107; padding:10px 14px;\">Asset<\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.08em; text-transform:uppercase; color:#FFC107; padding:10px 14px;\">Vector<\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.08em; text-transform:uppercase; color:#FFC107; padding:10px 14px;\">Raster<\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.08em; text-transform:uppercase; color:#FFC107; padding:10px 14px;\">Icon<\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.08em; text-transform:uppercase; color:#FFC107; padding:10px 14px;\">Sizes<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:1.4fr 1fr 1fr 1fr 1.3fr; background:#fff; font-family:'Figtree',sans-serif; font-size:10.5px; color:#3A352F;\">\n        <div style=\"padding:10px 14px; border-top:1px solid #ECE7DE;\">Primary lockup<\u002Fdiv>\n        <div style=\"padding:10px 14px; border-top:1px solid #ECE7DE;\">SVG · PDF<\u002Fdiv>\n        <div style=\"padding:10px 14px; border-top:1px solid #ECE7DE;\">PNG · JPG<\u002Fdiv>\n        <div style=\"padding:10px 14px; border-top:1px solid #ECE7DE;\">—<\u002Fdiv>\n        <div style=\"padding:10px 14px; border-top:1px solid #ECE7DE; font-family:'Space Mono',monospace; font-size:9px; color:#6E655A;\">1× 2× 3×<\u002Fdiv>\n        <div style=\"padding:10px 14px; border-top:1px solid #ECE7DE;\">Symbol<\u002Fdiv>\n        <div style=\"padding:10px 14px; border-top:1px solid #ECE7DE;\">SVG · PDF<\u002Fdiv>\n        <div style=\"padding:10px 14px; border-top:1px solid #ECE7DE;\">PNG<\u002Fdiv>\n        <div style=\"padding:10px 14px; border-top:1px solid #ECE7DE;\">ICO<\u002Fdiv>\n        <div style=\"padding:10px 14px; border-top:1px solid #ECE7DE; font-family:'Space Mono',monospace; font-size:9px; color:#6E655A;\">16·32·48·512·1024<\u002Fdiv
